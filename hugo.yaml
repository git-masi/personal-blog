# Hugo configuration file
title: Eric Masi

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1

    - name: About
      pageRef: /about
      weight: 2

    - name: Contact ↗
      url: "https://docs.google.com/forms/d/e/1FAIpQLSdbITJdzcO0cmDse1FOOa2iUg6ANwbbB22fsWhrbcLhBN1iSg/viewform?usp=dialog"
      weight: 3

    - name: Search
      weight: 4
      params:
        type: search

    - name: GitHub
      weight: 5
      url: "https://github.com/git-masi"
      params:
        icon: github

    - name: LinkedIn
      weight: 6
      url: "https://www.linkedin.com/in/emasi/"
      params:
        icon: linkedin

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    # Use a custom copyright component
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
